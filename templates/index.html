<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Lender</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<!-- Navigation -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand" href="/">🏦 Smart Lender</a>

<button class="navbar-toggler" type="button"
data-bs-toggle="collapse"
data-bs-target="#navbarNav">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link active" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/dashboard">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/performance">Performance</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/about">About</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/contact">Contact</a>
</li>

</ul>

</div>

</div>

</nav>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card shadow-lg p-4">

<h1 class="text-center text-primary">

🏦 Smart Lender

</h1>

<p class="text-center text-muted">

Machine Learning Based Loan Approval Prediction

</p>

<hr>

<form action="/predict" method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Gender</label>

<select class="form-select" name="gender" required>

<option value="">Select</option>

<option>Male</option>

<option>Female</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Married</label>

<select class="form-select" name="married" required>

<option value="">Select</option>

<option>Yes</option>

<option>No</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Dependents</label>

<select class="form-select" name="dependents" required>

<option>0</option>

<option>1</option>

<option>2</option>

<option>3+</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Education</label>

<select class="form-select" name="education" required>

<option>Graduate</option>

<option>Not Graduate</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Self Employed</label>

<select class="form-select" name="self_employed" required>

<option>No</option>

<option>Yes</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Applicant Income</label>

<input
type="number"
class="form-control"
name="applicant_income"
placeholder="Enter Applicant Income"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Coapplicant Income</label>

<input
type="number"
class="form-control"
name="coapplicant_income"
placeholder="Enter Coapplicant Income"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Loan Amount</label>

<input
type="number"
class="form-control"
name="loan_amount"
placeholder="Enter Loan Amount"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Loan Amount Term</label>

<input
type="number"
class="form-control"
name="loan_term"
value="360"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Credit History</label>

<select class="form-select"
name="credit_history"
required>

<option value="1">Good</option>

<option value="0">Bad</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Property Area</label>

<select
class="form-select"
name="property_area"
required>

<option>Urban</option>

<option>Semiurban</option>

<option>Rural</option>

</select>

</div>

</div>

<div class="text-center mt-3">

<button
type="submit"
class="btn btn-success btn-lg px-5">

Predict Loan

</button>

<button
type="reset"
class="btn btn-secondary btn-lg">

Reset

</button>

</div>

</form>

{% if prediction %}

<div class="mt-5">

<div class="alert alert-{{ alert }} text-center">

<h3>

{{ prediction }}

</h3>

</div>

</div>

{% endif %}

</div>

</div>

</div>

</div>
<li class="nav-item">
    <a class="nav-link" href="/history">History</a>
</li>

<footer class="text-center mt-5 mb-3">

<p>

© 2026 Smart Lender | Machine Learning Project

</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
